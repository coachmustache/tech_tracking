<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Operations Board</title>

<style>
body{
background:#121417;
color:#E6E8EB;
font-family:Arial;
margin:0;
padding:30px;
}

h1{
font-size:44px;
margin-bottom:5px;
}

.subtitle{
color:#9AA4AE;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}

.card{
background:#1C1F24;
border:1px solid #2A2F37;
border-radius:16px;
padding:20px;
}

.card h2{
font-size:16px;
color:#9AA4AE;
margin:0 0 10px 0;
}

.card .value{
font-size:36px;
font-weight:bold;
}

.panel{
margin-top:30px;
background:#1C1F24;
padding:20px;
border-radius:16px;
border:1px solid #2A2F37;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
color:#9AA4AE;
font-size:12px;
padding:8px;
}

td{
padding:10px;
border-top:1px solid #2A2F37;
}

.status{
padding:5px 10px;
border-radius:12px;
font-size:12px;
font-weight:bold;
}

.inprogress{color:#4C8DFF;}
.complete{color:#38C172;}
.warning{color:#F6AD55;}
.alert{color:#E05A5A;}

</style>
</head>

<body>

<h1>LIVE OPERATIONS BOARD</h1>
<div class="subtitle">Auto-refreshing dashboard powered by Google Sheets</div>

<div class="grid" id="metrics"></div>

<div class="panel">
<h2>Technician Status</h2>
<table>
<thead>
<tr>
<th>Tech</th>
<th>Status</th>
<th>Current Job</th>
<th>ETA</th>
</tr>
</thead>
<tbody id="techTable"></tbody>
</table>
</div>

<div class="panel">
<h2>Today's Jobs</h2>
<table>
<thead>
<tr>
<th>Time</th>
<th>Customer</th>
<th>Vehicle</th>
<th>Service</th>
<th>Status</th>
</tr>
</thead>
<tbody id="jobsTable"></tbody>
</table>
</div>

<script>

const SHEET_ID = "2PACX-1vTeWzamnXu-IAmqdGRm1uQjfYiqrMTRp6HLdI73SeH5o03q4uySdA6mNWAd7EZms84V-anPCi5G7wwt";

async function getSheet(sheet){

const url = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/gviz/tq?sheet=${sheet}&tqx=out:json`;

const res = await fetch(url);
const text = await res.text();

const json = JSON.parse(text.substr(47).slice(0,-2));

return json.table.rows.map(r=>r.c.map(c=>c?c.v:""));

}

function renderMetrics(data){

const container=document.getElementById("metrics");
container.innerHTML="";

data.slice(1).forEach(row=>{

container.innerHTML+=`
<div class="card">
<h2>${row[0]}</h2>
<div class="value">${row[1]}</div>
</div>
`

});

}

function renderTech(data){

const table=document.getElementById("techTable");
table.innerHTML="";

data.slice(1).forEach(r=>{

table.innerHTML+=`
<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
</tr>
`

});

}

function renderJobs(data){

const table=document.getElementById("jobsTable");
table.innerHTML="";

data.slice(1).forEach(r=>{

table.innerHTML+=`
<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[4]}</td>
</tr>
`

});

}

async function loadData(){

const metrics=await getSheet("Metrics");
renderMetrics(metrics);

const tech=await getSheet("Tech_Status");
renderTech(tech);

const jobs=await getSheet("Jobs_Today");
renderJobs(jobs);

}

loadData();

setInterval(loadData,30000);

</script>

</body>
</html>
