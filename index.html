<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Operations Board</title>
  <style>
    :root{
      --bg:#121417;
      --card:#1C1F24;
      --muted:#9AA4AE;
      --text:#E6E8EB;
      --line:#2A2F37;

      --good:#38C172;
      --warn:#F6AD55;
      --bad:#E05A5A;
      --info:#4C8DFF;
      --parts:#F6E05E;
    }
    *{box-sizing:border-box}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .wrap{max-width:1600px; margin:0 auto; padding:28px 28px 18px;}
    .topbar{
      display:flex; align-items:flex-end; justify-content:space-between; gap:16px;
      padding-bottom:14px; border-bottom:1px solid var(--line);
    }
    .title{
      font-size:44px; font-weight:800; letter-spacing:.5px; line-height:1;
    }
    .subtitle{
      margin-top:8px; color:var(--muted); font-size:16px;
    }
    .meta{
      text-align:right; color:var(--muted); font-size:14px;
    }
    .meta strong{color:var(--text); font-weight:700}
    .banner{
      margin-top:14px; padding:10px 12px; border-radius:12px;
      background:#2b1d1d; border:1px solid #4a2a2a; color:#ffcccc;
      display:none;
    }

    .grid{
      margin-top:18px;
      display:grid;
      grid-template-columns: 1.2fr 1fr;
      gap:18px;
    }

    .cards{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px 18px;
      min-height:102px;
      display:flex; flex-direction:column; justify-content:space-between;
    }
    .card .label{color:var(--muted); font-size:14px; font-weight:650; letter-spacing:.3px}
    .card .value{font-size:36px; font-weight:800; line-height:1.1}
    .card .hint{color:var(--muted); font-size:12px}

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 16px;
    }
    .panel h2{
      margin:0 0 10px 0; font-size:18px; letter-spacing:.3px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }
    th, td{
      padding:10px 10px;
      border-top:1px solid var(--line);
      vertical-align:middle;
    }
    th{
      text-align:left;
      color:var(--muted);
      font-size:12px;
      letter-spacing:.35px;
      text-transform:uppercase;
      border-top:none;
      padding-top:4px;
    }

    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-weight:750;
      font-size:12px;
      letter-spacing:.2px;
      border:1px solid var(--line);
      background:#161a20;
      
    }
    .pill.good{color:var(--good); border-color:#244a35; background:#111b15;}
    .pill.warn{color:var(--warn); border-color:#5a4524; background:#1b160e;}
    .pill.bad{color:var(--bad); border-color:#5a2a2a; background:#1b1010;}
    .pill.info{color:var(--info); border-color:#203a5a; background:#0f1622;}
    .pill.parts{color:var(--parts); border-color:#5a5324; background:#1b1a0e;
    @media (max-width: 1100px){
      .grid{grid-template-columns:1fr}
      .cards{grid-template-columns: repeat(2, 1fr);}
      .title{font-size:34px}
      .card .value{font-size:30px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">LIVE OPERATIONS BOARD</div>
        <div class="subtitle">Auto-refreshing dashboard powered by Google Sheets (CSV)</div>
      </div>
      <div class="meta">
        <div>Refresh: <strong><span id="refreshSec">30</span>s</strong></div>
        <div>Last Updated: <strong><span id="lastUpdated">—</span></strong></div>
      </div>
    </div>

    <div class="banner" id="banner"></div>

    <div class="grid">
      <div>
        <div class="cards" id="kpiCards"></div>
      </div>

      <div class="panel">
        <h2>Technician Status</h2>
        <table>
          <thead>
            <tr>
              <th style="width:18%">Tech</th>
              <th style="width:18%">Status</th>
              <th>Current Job</th>
              <th style="width:14%">ETA</th>
            </tr>
          </thead>
          <tbody id="techRows"></tbody>
        </table>
      </div>

      <div class="panel" style="grid-column: 1 / -1;">
        <h2>Today’s Jobs</h2>
        <table>
          <thead>
            <tr>
              <th style="width:10%">Time</th>
              <th style="width:18%">Customer</th>
              <th style="width:18%">Vehicle</th>
              <th>Service</th>
              <th style="width:16%">Status</th>
            </tr>
          </thead>
          <tbody id="jobRows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ====== CSV URLS (yours) ======
    const METRICS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTeWzamnXu-IAmqdGRm1uQjfYiqrMTRp6HLdI73SeH5o03q4uySdA6mNWAd7EZms84V-anPCi5G7wwt/pub?gid=0&single=true&output=csv";
    const TECH_CSV    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTeWzamnXu-IAmqdGRm1uQjfYiqrMTRp6HLdI73SeH5o03q4uySdA6mNWAd7EZms84V-anPCi5G7wwt/pub?gid=114076164&single=true&output=csv";
    const JOBS_CSV    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTeWzamnXu-IAmqdGRm1uQjfYiqrMTRp6HLdI73SeH5o03q4uySdA6mNWAd7EZms84V-anPCi5G7wwt/pub?gid=588249316&single=true&output=csv";

    const REFRESH_SECONDS = 30;
    document.getElementById("refreshSec").textContent = REFRESH_SECONDS;

    // ====== UI helpers ======
    function showBanner(msg){
      const b = document.getElementById("banner");
      b.textContent = msg;
      b.style.display = "block";
    }
    function hideBanner(){
      const b = document.getElementById("banner");
      b.style.display = "none";
      b.textContent = "";
    }

    // ====== CSV parsing (handles quoted commas) ======
    function parseCSV(text){
      const rows = [];
      let row = [];
      let cur = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++){
        const ch = text[i];
        const next = text[i+1];

        if (ch === '"' ){
          if (inQuotes && next === '"'){ // escaped quote
            cur += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === ',' && !inQuotes){
          row.push(cur);
          cur = "";
        } else if ((ch === '\n' || ch === '\r') && !inQuotes){
          if (ch === '\r' && next === '\n') i++;
          row.push(cur);
          if (row.some(v => v !== "")) rows.push(row);
          row = [];
          cur = "";
        } else {
          cur += ch;
        }
      }
      // last cell
      row.push(cur);
      if (row.some(v => v !== "")) rows.push(row);

      return rows;
    }

    async function fetchCSV(url){
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`Fetch failed (${res.status}) for ${url}`);
      const text = await res.text();
      return parseCSV(text.trim());
    }

    // ====== rendering ======
    function statusPill(status){
      const s = (status || "").toString().toLowerCase();
      let cls = "info";
      if (s.includes("in progress")) cls = "info";
      else if (s.includes("diagnostic")) cls = "warn";
      else if (s.includes("waiting") || s.includes("awaiting")) cls = "parts";
      else if (s.includes("repair")) cls = "bad";
      else if (s.includes("complete")) cls = "good";
      else if (s.includes("break")) cls = "info";
      return `<span class="pill ${cls}">${status || "—"}</span>`;
    }

    function kpiAccent(label){
      const l = (label || "").toLowerCase();
      if (l.includes("revenue") || l.includes("sales")) return "style='color: var(--info)'";
      if (l.includes("profit")) return "style='color: var(--good)'";
      if (l.includes("expense") || l.includes("alerts") || l.includes("low")) return "style='color: var(--bad)'";
      if (l.includes("open") || l.includes("assigned")) return "style='color: var(--warn)'";
      return "";
    }

    function formatMaybeCurrency(label, value){
      const l = (label || "").toLowerCase();
      const n = Number((value ?? "").toString().replace(/[^0-9.\-]/g,""));
      const looksNumeric = !Number.isNaN(n);

      if (looksNumeric && (l.includes("revenue") || l.includes("sales") || l.includes("profit") || l.includes("value"))){
        return n.toLocaleString(undefined, { style:"currency", currency:"USD", maximumFractionDigits:0 });
      }
      return (value ?? "—");
    }

    function renderKPIs(data){
      // data: [ [Metric,Value], ... ] including header
      const el = document.getElementById("kpiCards");
      el.innerHTML = "";

      const rows = data.slice(1).filter(r => (r[0] || "").trim() !== "");
      rows.slice(0, 6).forEach(r => {
        const label = (r[0] ?? "").trim();
        const val = (r[1] ?? "").trim();
        el.insertAdjacentHTML("beforeend", `
          <div class="card">
            <div class="label">${label}</div>
            <div class="value" ${kpiAccent(label)}>${formatMaybeCurrency(label, val)}</div>
            <div class="hint">&nbsp;</div>
          </div>
        `);
      });
    }

    function renderTech(data){
      const tbody = document.getElementById("techRows");
      tbody.innerHTML = "";
      data.slice(1).forEach(r => {
        const [name, status, job, eta] = r;
        if (!name && !status && !job && !eta) return;
        tbody.insertAdjacentHTML("beforeend", `
          <tr>
            <td>${name || "—"}</td>
            <td>${statusPill(status)}</td>
            <td>${job || "—"}</td>
            <td>${eta || "—"}</td>
          </tr>
        `);
      });
    }

    function renderJobs(data){
      const tbody = document.getElementById("jobRows");
      tbody.innerHTML = "";
      data.slice(1).forEach(r => {
        const [time, customer, vehicle, service, status] = r;
        if (!time && !customer && !vehicle && !service && !status) return;
        tbody.insertAdjacentHTML("beforeend", `
          <tr>
            <td>${time || "—"}</td>
            <td>${customer || "—"}</td>
            <td>${vehicle || "—"}</td>
            <td>${service || "—"}</td>
            <td>${statusPill(status)}</td>
          </tr>
        `);
      });
    }

    async function refresh(){
      try{
        hideBanner();

        const [metrics, tech, jobs] = await Promise.all([
          fetchCSV(METRICS_CSV),
          fetchCSV(TECH_CSV),
          fetchCSV(JOBS_CSV),
        ]);

        renderKPIs(metrics);
        renderTech(tech);
        renderJobs(jobs);

        document.getElementById("lastUpdated").textContent = new Date().toLocaleString();
      } catch (e){
        console.error(e);
        showBanner("⚠ Unable to load live CSV data. Confirm the Publish-to-web CSV links are public and the gids match the correct tabs.");
      }
    }

    refresh();
    setInterval(refresh, REFRESH_SECONDS * 1000);
  </script>
</body>
</html>
