<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Operations Board</title>
  <style>
    :root{
      --bg:#121417;
      --card:#1C1F24;
      --muted:#9AA4AE;
      --text:#E6E8EB;
      --line:#2A2F37;

      --good:#38C172;
      --warn:#F6AD55;
      --bad:#E05A5A;
      --info:#4C8DFF;
    }
    *{box-sizing:border-box}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .wrap{max-width:1600px; margin:0 auto; padding:28px 28px 18px;}
    .topbar{
      display:flex; align-items:flex-end; justify-content:space-between; gap:16px;
      padding-bottom:14px; border-bottom:1px solid var(--line);
    }
    .title{
      font-size:44px; font-weight:800; letter-spacing:.5px; line-height:1;
    }
    .subtitle{
      margin-top:8px; color:var(--muted); font-size:16px;
    }
    .meta{
      text-align:right; color:var(--muted); font-size:14px;
    }
    .meta strong{color:var(--text); font-weight:700}
    .banner{
      margin-top:14px; padding:10px 12px; border-radius:12px;
      background:#2b1d1d; border:1px solid #4a2a2a; color:#ffcccc;
      display:none;
    }

    .grid{
      margin-top:18px;
      display:grid;
      grid-template-columns: 1.2fr 1fr;
      gap:18px;
    }

    .cards{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px 18px;
      min-height:102px;
      display:flex; flex-direction:column; justify-content:space-between;
    }
    .card .label{color:var(--muted); font-size:14px; font-weight:650; letter-spacing:.3px}
    .card .value{font-size:36px; font-weight:800; line-height:1.1}
    .card .hint{color:var(--muted); font-size:12px}

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 16px;
    }
    .panel h2{
      margin:0 0 10px 0; font-size:18px; letter-spacing:.3px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }
    th, td{
      padding:10px 10px;
      border-top:1px solid var(--line);
      vertical-align:middle;
    }
    th{
      text-align:left;
      color:var(--muted);
      font-size:12px;
      letter-spacing:.35px;
      text-transform:uppercase;
      border-top:none;
      padding-top:4px;
    }

    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-weight:750;
      font-size:12px;
      letter-spacing:.2px;
      border:1px solid var(--line);
      background:#161a20;
    }
    .pill.good{color:var(--good); border-color:#244a35; background:#111b15;}
    .pill.warn{color:var(--warn); border-color:#5a4524; background:#1b160e;}
    .pill.bad{color:var(--bad); border-color:#5a2a2a; background:#1b1010;}
    .pill.info{color:var(--info); border-color:#203a5a; background:#0f1622;}

    /* TV-friendly: hide overflow, big content */
    @media (max-width: 1100px){
      .grid{grid-template-columns:1fr}
      .cards{grid-template-columns: repeat(2, 1fr);}
      .title{font-size:34px}
      .card .value{font-size:30px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">LIVE OPERATIONS BOARD</div>
        <div class="subtitle">Auto-refreshing dashboard powered by Google Sheets</div>
      </div>
      <div class="meta">
        <div>Refresh: <strong><span id="refreshSec">20</span>s</strong></div>
        <div>Last Updated: <strong><span id="lastUpdated">—</span></strong></div>
      </div>
    </div>

    <div class="banner" id="banner"></div>

    <div class="grid">
      <div>
        <div class="cards" id="kpiCards"></div>
      </div>

      <div class="panel">
        <h2>Technician Status</h2>
        <table>
          <thead>
            <tr>
              <th style="width:18%">Tech</th>
              <th style="width:18%">Status</th>
              <th>Current Job</th>
              <th style="width:14%">ETA</th>
            </tr>
          </thead>
          <tbody id="techRows"></tbody>
        </table>
      </div>

      <div class="panel" style="grid-column: 1 / -1;">
        <h2>Today’s Jobs</h2>
        <table>
          <thead>
            <tr>
              <th style="width:10%">Time</th>
              <th style="width:18%">Customer</th>
              <th style="width:18%">Vehicle</th>
              <th>Service</th>
              <th style="width:16%">Status</th>
            </tr>
          </thead>
          <tbody id="jobRows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ====== CONFIG ======
    const SHEET_ID = "PASTE_YOUR_SHEET_ID_HERE";
    const REFRESH_SECONDS = 20;

    // Sheet/tab names must match exactly:
    const TAB_METRICS = "Metrics";
    const TAB_TECH = "Tech_Status";
    const TAB_JOBS = "Jobs_Today";

    document.getElementById("refreshSec").textContent = REFRESH_SECONDS;

    // ====== HELPERS ======
    function showBanner(msg){
      const b = document.getElementById("banner");
      b.textContent = msg;
      b.style.display = "block";
    }
    function hideBanner(){
      const b = document.getElementById("banner");
      b.style.display = "none";
      b.textContent = "";
    }

    // Google Visualization API endpoint (no API key needed if published)
    function gvizUrl(tabName){
      // cache buster prevents stale data
      return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(tabName)}&tqx=out:json&_=${Date.now()}`;
    }

    async function fetchGviz(tabName){
      const res = await fetch(gvizUrl(tabName));
      const text = await res.text();
      // gviz wraps JSON in a function call; extract JSON object
      const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
      const table = json.table;
      const cols = table.cols.map(c => (c.label || "").trim());
      const rows = table.rows.map(r => (r.c || []).map(cell => cell ? cell.v : ""));
      return { cols, rows };
    }

    function statusPill(status){
      const s = (status || "").toString().toLowerCase();
      let cls = "info";
      if (s.includes("in progress")) cls = "info";
      else if (s.includes("diagnostic")) cls = "warn";
      else if (s.includes("waiting")) cls = "warn";
      else if (s.includes("repair")) cls = "bad";
      else if (s.includes("complete")) cls = "good";
      else if (s.includes("break")) cls = "info";
      return `<span class="pill ${cls}">${status || "—"}</span>`;
    }

    function kpiAccent(label){
      const l = (label || "").toLowerCase();
      if (l.includes("revenue") || l.includes("sales")) return "style='color: var(--info)'";
      if (l.includes("profit")) return "style='color: var(--good)'";
      if (l.includes("expense") || l.includes("alerts") || l.includes("low")) return "style='color: var(--bad)'";
      if (l.includes("open") || l.includes("assigned")) return "style='color: var(--warn)'";
      return "";
    }

    function formatMaybeCurrency(label, value){
      const l = (label || "").toLowerCase();
      if (l.includes("revenue") || l.includes("sales") || l.includes("profit") || l.includes("value")){
        const n = Number(value);
        if (!Number.isNaN(n)) return n.toLocaleString(undefined, { style:"currency", currency:"USD", maximumFractionDigits:0 });
      }
      return value ?? "—";
    }

    // ====== RENDER ======
    function renderKPIs(metrics){
      const el = document.getElementById("kpiCards");
      el.innerHTML = "";

      // Expect rows: [Metric, Value]
      metrics.rows
        .filter(r => r[0] && r[0] !== "Metric")
        .slice(0, 6) // keep it board-friendly
        .forEach(r => {
          const label = r[0];
          const val = r[1];
          const pretty = formatMaybeCurrency(label, val);
          el.insertAdjacentHTML("beforeend", `
            <div class="card">
              <div class="label">${label}</div>
              <div class="value" ${kpiAccent(label)}>${pretty}</div>
              <div class="hint">&nbsp;</div>
            </div>
          `);
        });
    }

    function renderTech(tech){
      const tbody = document.getElementById("techRows");
      tbody.innerHTML = "";

      tech.rows
        .filter(r => r.some(v => v !== ""))
        .forEach(r => {
          const [name, status, job, eta] = r;
          tbody.insertAdjacentHTML("beforeend", `
            <tr>
              <td>${name || "—"}</td>
              <td>${statusPill(status)}</td>
              <td>${job || "—"}</td>
              <td>${eta || "—"}</td>
            </tr>
          `);
        });
    }

    function renderJobs(jobs){
      const tbody = document.getElementById("jobRows");
      tbody.innerHTML = "";

      jobs.rows
        .filter(r => r.some(v => v !== ""))
        .forEach(r => {
          const [time, customer, vehicle, service, status] = r;
          tbody.insertAdjacentHTML("beforeend", `
            <tr>
              <td>${time || "—"}</td>
              <td>${customer || "—"}</td>
              <td>${vehicle || "—"}</td>
              <td>${service || "—"}</td>
              <td>${statusPill(status)}</td>
            </tr>
          `);
        });
    }

    async function refresh(){
      try{
        hideBanner();

        const [metrics, tech, jobs] = await Promise.all([
          fetchGviz(TAB_METRICS),
          fetchGviz(TAB_TECH),
          fetchGviz(TAB_JOBS),
        ]);

        renderKPIs(metrics);
        renderTech(tech);
        renderJobs(jobs);

        const now = new Date();
        document.getElementById("lastUpdated").textContent = now.toLocaleString();

      } catch (e){
        console.error(e);
        showBanner("⚠ Unable to load live data. Check: (1) Sheet is Published to Web, (2) SHEET_ID is correct, (3) tab names match.");
      }
    }

    refresh();
    setInterval(refresh, REFRESH_SECONDS * 1000);
  </script>
</body>
</html>
